<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello world project</title>

    <!-- UA Parser for browser detection -->
    <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.2/src/ua-parser.min.js"></script>

    <!-- ClickOnce deployment function -->
    <script>
      function startDownload() {
        const baseUrl = window.location.origin;
        const clickonceLink = `${baseUrl}/deploy/whatsmaster.application`;
        const uap = new UAParser();
        const browserName = uap.getResult().browser.name;

        console.log("Starting download, browser:", browserName);
        console.log("ClickOnce URL:", clickonceLink);

        // For ClickOnce to work properly, we need to trigger download directly
        if (browserName === "Edge") {
          // Direct download in Edge
          window.location.href = clickonceLink;
        } else {
          // Try to open with Edge from other browsers
          const edgeUrl = `microsoft-edge:${clickonceLink}`;
          console.log("Trying to open with Edge:", edgeUrl);

          // Try opening with Edge
          const tryEdge = () => {
            window.location.href = edgeUrl;
          };

          // Fallback to direct download after short delay
          const fallback = () => {
            setTimeout(() => {
              console.log("Falling back to direct download");
              window.location.href = clickonceLink;
            }, 1000);
          };

          tryEdge();
          fallback();
        }
      }

      // Make function globally available
      window.startDownload = startDownload;
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
